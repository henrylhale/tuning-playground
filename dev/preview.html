<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Responsive preview — Tuning Playground</title>
<!--
  Local-only multi-width preview. NOT deployed: the GitHub Action only copies
  top-level ./*.html into the site, and this lives in dev/.

  Best run via a local server so the iframes load cleanly and pick up edits:
      cd /Users/henry/just-playground && python3 -m http.server 8000
      open http://localhost:8000/dev/preview.html
  Opening the file directly (file://) also works in Chrome.
-->
<style>
  *{box-sizing:border-box}
  body{margin:0;background:#2a2a2e;color:#e8e8ea;
    font:13px/1.4 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif}
  header{position:sticky;top:0;z-index:10;display:flex;flex-wrap:wrap;align-items:center;gap:14px;
    padding:10px 14px;background:#1c1c20;border-bottom:1px solid #000}
  header b{font-weight:700;letter-spacing:.3px}
  .seg{display:flex;gap:2px;background:#111;border-radius:7px;padding:2px}
  .seg button{appearance:none;border:0;cursor:pointer;background:transparent;color:#bcbcc2;
    padding:6px 11px;border-radius:5px;font-size:12.5px;font-weight:600}
  .seg button.on{background:#e26a10;color:#1a0d00}
  label.chk{display:flex;align-items:center;gap:6px;color:#bcbcc2;cursor:pointer}
  .reload{margin-left:auto;appearance:none;border:1px solid #444;background:#333;color:#eee;
    border-radius:6px;padding:7px 13px;cursor:pointer;font-weight:600}
  .reload:hover{background:#3c3c42}
  .row{display:flex;gap:18px;padding:18px;overflow-x:auto;align-items:flex-start}
  .frame{flex:none;display:flex;flex-direction:column;gap:6px}
  .frame .cap{font-size:12px;color:#9a9aa2;text-align:center}
  .frame .cap b{color:#e26a10}
  iframe{border:0;background:#bfa97f;border-radius:10px;
    box-shadow:0 0 0 6px #111, 0 10px 30px rgba(0,0,0,.5)}
</style>
</head>
<body>
  <header>
    <b>Responsive preview</b>
    <div class="seg" id="apps">
      <button data-src="../quartet.html" class="on">quartet</button>
      <button data-src="../voice-synth.html">voice-synth</button>
      <button data-src="../index.html">index</button>
    </div>
    <label class="chk"><input type="checkbox" id="autoreload"> auto-reload (2s)</label>
    <button class="reload" id="reload">⟳ Reload all</button>
  </header>
  <div class="row" id="row"></div>

<script>
  // width, label, viewport height for the iframe
  const WIDTHS = [
    [320, "iPhone SE / small", 1900],
    [375, "iPhone",            1800],
    [414, "iPhone Plus/Max",   1700],
    [768, "tablet",            1500],
  ];
  let src = "../quartet.html";
  const row = document.getElementById("row");

  function build(){
    row.innerHTML = "";
    for(const [w, label, h] of WIDTHS){
      const f = document.createElement("div");
      f.className = "frame";
      f.innerHTML =
        `<div class="cap"><b>${w}px</b> · ${label}</div>` +
        `<iframe src="${src}" style="width:${w}px;height:${h}px"></iframe>`;
      row.appendChild(f);
    }
  }
  build();

  document.getElementById("apps").addEventListener("click", e => {
    const b = e.target.closest("button[data-src]");
    if(!b) return;
    [...e.currentTarget.children].forEach(c => c.classList.toggle("on", c === b));
    src = b.dataset.src;
    build();
  });
  document.getElementById("reload").addEventListener("click", build);

  let timer = null;
  document.getElementById("autoreload").addEventListener("change", e => {
    clearInterval(timer);
    if(e.target.checked) timer = setInterval(build, 2000);
  });
</script>
</body>
</html>
